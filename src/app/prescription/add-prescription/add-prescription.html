@if(!pdfUrl) {
<div class="backdrop">

    <dialog open class="medical-dialog">
        <h2 class="form-title">Nueva Receta Médica</h2>
        <hr>

        <form (ngSubmit)="onSubmit()" class="prescription-form">

            <div class="form-row">
                <div class="form-group">
                    <label>Nombre del Paciente</label>
                    <input type="text" name="name" [(ngModel)]="newPrescription.name" placeholder="Ej. Juan Pérez">
                </div>

                <div class="form-group small-input">
                    <label>Edad</label>
                    <input type="number" name="age" [(ngModel)]="newPrescription.age" placeholder="00">
                </div>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" name="address" [(ngModel)]="newPrescription.address" placeholder="Calle, Ciudad...">
            </div>

            <div class="form-group">
                <label>Fecha</label>
                <input type="date" name="date" [(ngModel)]="newPrescription.date">
            </div>

            <div class="medication-builder">
                <label>Añadir Medicamento</label>
                <div class="med-row">
                    <select [(ngModel)]="currentMed.medicine" name="medName">
                        <option value="">-- Medicina --</option>
                        <option value="Amoxicilina">Amoxicilina</option>
                        <option value="Diclofenaco">Diclofenaco</option>
                    </select>

                    <input type="text" [(ngModel)]="currentMed.mg" name="medMg" placeholder="mg (ej. 500)">

                    <select [(ngModel)]="currentMed.useType" name="medType">
                        <option value="">-- Frecuencia --</option>
                        <option value="Cada 8 horas">Cada 8 horas</option>
                        <option value="Cada 12 horas">Cada 12 horas</option>
                        <option value="Una vez al día">Una vez al día</option>
                    </select>

                    <select [(ngModel)]="currentMed.route" name="medRoute">
                        <option value="">-- Vía --</option>
                        <option value="Oral">Oral</option>
                        <option value="Tópica">Tópica</option>
                        <option value="Intravenosa">Intravenosa (IV)</option>
                        <option value="Intramuscular">Intramuscular (IM)</option>
                        <option value="Sublingual">Sublingual</option>
                        <option value="Inhalada">Inhalada</option>
                        <option value="Rectal">Rectal</option>
                        <option value="Oftálmica">Oftálmica</option>
                    </select>

                    <input type="number" [(ngModel)]="currentMed.days" name="medDays" placeholder="Días" min="1">
                </div>

                <div class="btn-add-wrapper">
                    <button type="button" class="btn-add" (click)="addMed()">+</button>
                </div>

                <ul class="med-chips">
                    @for (m of newPrescription.medications; track $index) {
                    <li>{{ m.medicine }} {{ m.mg }}mg — {{ m.useType }} — Vía {{ m.route }} — {{ m.days }} día(s) </li>
                    }
                </ul>

                <div class="form-group mt-4">
                    <label>Notas Adicionales o Medicina Manual</label>
                    <textarea name="extra" [(ngModel)]="newPrescription.extraNotes" rows="3"
                        placeholder="Escriba aquí si no encontró la medicina o desea agregar indicaciones extras..."></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="cancelReceta()">Cancelar</button>
                <button type="submit" class="btn-submit" (click)="convertTo()">Guardar Receta</button>
            </div>
        </form>
    </dialog>
</div>
}

@else {
<div class="backdrop">
    <dialog open class="medical-dialog preview-modal">
        <div class="preview-header">
            <h2 class="form-title">Vista Previa de Receta</h2>
            <button class="btn-close" (click)="pdfUrl = null">✕</button>
        </div>
        <hr>

        <div class="pdf-container">
            <iframe [src]="pdfUrl | safeUrl"></iframe>
        </div>

        <div class="form-actions mt-4">
            <button type="button" class="btn-cancel" (click)="pdfUrl = null">
                Editar Datos
            </button>
            <button type="button" class="btn-submit" (click)="cancelReceta()">
                Finalizar y Cerrar
            </button>
        </div>
    </dialog>
</div>
}

<div class="off-screen-container" style="position: absolute; left: -9999px; top: 0;">
    <app-prescription-example></app-prescription-example>
</div>
