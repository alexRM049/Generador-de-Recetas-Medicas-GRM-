<div class="card h-100 shadow-sm border-0 border-top border-4 border-primary">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title text-primary fw-bold mb-0">{{receta.name}}</h5>
      <span class="badge bg-light text-dark border">{{receta.gender}}</span>
    </div>
    
    <h6 class="card-subtitle mb-3 text-muted">
      Age: {{receta.age}} | ID: {{receta.id}}
    </h6>
    
    <div class="card-text prescription-text">
      <strong>Medicamentos:</strong><br>
      <br>
      <p>this is a precription sample</p>
      <p>this is another precription sample</p>
    </div>
  </div>
  
  <div class="card-footer bg-transparent border-0 pb-3">
    <button class="btn btn-outline-primary w-100">View Full History</button>
  </div>
</div>
